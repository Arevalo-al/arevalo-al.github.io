<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro secreto</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family: 'Georgia', serif;
    text-align:center;
    overflow:hidden;
}

.pantalla{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    font-size:40px;
    letter-spacing:5px;
    opacity:0;
    animation: aparecer 3s forwards;
}

p{
    font-size:18px;
    opacity:0;
    animation: aparecer 3s 2s forwards;
}

button{
    margin-top:40px;
    padding:15px 40px;
    border:1px solid white;
    background:transparent;
    color:white;
    border-radius:30px;
    font-size:18px;
    letter-spacing:3px;
}

@keyframes aparecer{
    to{opacity:1;}
}

#sorpresa{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#mensaje{
    font-size:28px;
    max-width:80%;
    line-height:1.5;
}
</style>
</head>

<body>

<div class="pantalla">
    <h1>LO QUE FUE,<br> SERÁ ETERNO.</h1>
    <p>Toca la pantalla para escuchar...</p>
    <button onclick="mostrar()">NUESTRO SECRETO</button>
</div>

<div id="sorpresa">
    <div id="mensaje">
        Desde el día que llegaste, todo cambió.  
        Este pequeño rincón es solo para recordarte  
        cuánto significas para mí ❤️
    </div>
</div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function mostrar(){
    document.getElementById("sorpresa").style.display="flex";
    document.getElementById("musica").play();
}
</script>

</body>
</html>
